<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetCup - O seu Bolão Esportivo</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,800;0,900;1,900&display=swap"
        rel="stylesheet">

    <style>
        /* =======================================================================
           ESTRUTURA VISUAL PRINCIPAL E BRANDING "BETCUP"
           ======================================================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #0b0e14;
            color: #ffffff;
            padding-bottom: 100px;
        }

        /* --- CABEÇALHO COMPACTO --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: linear-gradient(135deg, #1a1f2e 0%, #0b0e14 100%);
            border-bottom: 2px solid #00ff88;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .logo-betcup {
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .logo-icone {
            font-size: 24px;
        }

        .logo-texto {
            font-size: 22px;
            font-weight: 900;
            font-style: italic;
            color: #ffffff;
            letter-spacing: -1px;
            line-height: 1;
        }

        .logo-destaque {
            color: #00ff88;
        }

        .logo-subtitulo {
            display: block;
            font-size: 9px;
            color: #8b9bb4;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* --- CENTRO DE COMANDO DO USUÁRIO LOGADO --- */
        .area-usuario {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-header {
            background-color: #ffd700;
            color: #0b0e14;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-sair {
            background-color: transparent;
            color: #ff3366;
            border: 1px solid #ff3366;
        }

        .wrapper-acoes-usuario {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .linha-topo-usuario {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #msg-usuario {
            font-size: 11px;
            color: #8b9bb4;
            font-weight: 600;
        }

        /* Botão de Suporte Neon customizado para o WhatsApp do Danilo */
        .btn-suporte {
            background: linear-gradient(90deg, rgba(37, 211, 102, 0.1) 0%, rgba(37, 211, 102, 0.2) 100%);
            color: #25D366;
            border: 1px solid rgba(37, 211, 102, 0.4);
            padding: 4px 10px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(37, 211, 102, 0.1);
            transition: 0.3s;
        }

        .btn-suporte:hover {
            background: #25D366;
            color: #0b0e14;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.6);
        }

        .btn-suporte span {
            font-size: 14px;
        }

        /* --- BANNER DE COMPARTILHAMENTO GLOBAL (OPÇÃO 3) --- */
        .banner-compartilhamento {
            background: linear-gradient(135deg, #ff9900 0%, #ff3366 100%);
            border-radius: 0px;
            padding: 12px 15px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(255, 51, 102, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .banner-compartilhamento h4 {
            color: #ffffff;
            font-weight: 900;
            font-size: 14px;
            margin-bottom: 3px;
            text-transform: uppercase;
        }

        .banner-compartilhamento p {
            color: #ffffff;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .btn-share-banner {
            background: #0b0e14;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 900;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            max-width: 300px;
            transition: 0.2s;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-share-banner:hover {
            background: #ffffff;
            color: #ff3366;
        }

        /* --- NAVEGAÇÃO DE ABAS PRINCIPAIS --- */
        .container-abas {
            display: flex;
            padding: 15px;
            gap: 8px;
            background-color: #0b0e14;
        }

        .aba-principal {
            flex: 1;
            padding: 12px 5px;
            background-color: #1a1f2e;
            color: #8b9bb4;
            border: 1px solid #2a3248;
            border-radius: 8px;
            font-weight: 800;
            font-size: 11px;
            cursor: pointer;
            text-transform: uppercase;
            text-align: center;
            transition: 0.3s;
        }

        .aba-principal.ativa {
            background-color: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border-color: #00ff88;
        }

        main {
            padding: 0 15px;
        }

        .conteudo-aba {
            display: none;
        }

        .conteudo-aba.ativo {
            display: block;
        }

        /* =======================================================================
           DESIGN: CARDS DE JOGO HORIZONTAIS COMPACTOS
           ======================================================================= */
        .jogo-card {
            background-color: #1a1f2e;
            border: 1px solid #2a3248;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .data-jogo {
            font-size: 10px;
            color: #8b9bb4;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-align: center;
        }

        .confronto-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 5px;
            margin-bottom: 10px;
        }

        .time-bloco {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            overflow: hidden;
        }

        .time-bloco.direita {
            flex-direction: row-reverse;
            text-align: right;
        }

        .nome-time {
            font-size: 12px;
            font-weight: 800;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80px;
        }

        .bandeira-placeholder {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #2a3248;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: #8b9bb4;
            border: 1px solid #ffd700;
            flex-shrink: 0;
        }

        .bandeira {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #ffd700;
            flex-shrink: 0;
        }

        .placar-area {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .input-gol {
            width: 38px;
            height: 38px;
            text-align: center;
            font-size: 16px;
            font-weight: 800;
            background-color: #0b0e14;
            border: 1px solid #2a3248;
            color: #ffffff;
            border-radius: 6px;
        }

        .input-gol:focus {
            outline: none;
            border-color: #00ff88;
        }

        .vs {
            color: #ff3366;
            font-size: 11px;
            font-weight: 900;
        }

        .selo-apostas-jogo {
            margin-bottom: 10px;
            padding: 4px;
            background: #0b0e14;
            border-radius: 6px;
            font-size: 10px;
            text-align: center;
            color: #ffd700;
            font-weight: 600;
            border: 1px dashed #2a3248;
        }

        /* ÁREA DO PRÊMIO DINÂMICO */
        .info-premio {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            font-size: 11px;
            color: #ffffff;
            font-weight: 600;
            line-height: 1.4;
        }

        .info-premio span {
            color: #00ff88;
            font-weight: 900;
            font-size: 13px;
        }

        /* --- CARDS DE HISTÓRICO --- */
        .card-minha-aposta {
            background-color: #1a1f2e;
            border: 1px solid #2a3248;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .detalhes-aposta {
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: left;
        }

        .detalhes-aposta .confronto {
            font-size: 13px;
            font-weight: 700;
            color: #ffffff;
        }

        .detalhes-aposta .palpite {
            font-size: 12px;
            color: #8b9bb4;
        }

        .detalhes-aposta .palpite span {
            color: #ffd700;
            font-weight: 800;
        }

        .status-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge-status.pago {
            font-size: 10px;
            font-weight: 800;
            color: #00ff88;
            border: 1px solid #00ff88;
            padding: 4px 8px;
            border-radius: 6px;
            background-color: rgba(0, 255, 136, 0.05);
            text-transform: uppercase;
        }

        /* --- BARRA DO CARRINHO --- */
        #barra-flutuante-apostas {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background-color: #00ff88;
            color: #0b0e14;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
            display: none;
            z-index: 1000;
        }

        .info-barra {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: 800;
            font-size: 14px;
        }

        #btn-revisar-apostas {
            width: 100%;
            background-color: #0b0e14;
            color: #00ff88;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* --- MODAIS E ALERTAS --- */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
        }

        .modal-content {
            background: #1a1f2e;
            width: 90%;
            max-width: 350px;
            margin: 100px auto;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #2a3248;
            position: relative;
        }

        .fechar {
            position: absolute;
            top: 15px;
            right: 15px;
            color: #ff3366;
            font-size: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .input-auth {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #0b0e14;
            border: 1px solid #2a3248;
            color: white;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-auth {
            width: 100%;
            padding: 12px;
            background: #ffd700;
            color: #0b0e14;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .link-auth {
            display: block;
            text-align: center;
            color: #8b9bb4;
            font-size: 12px;
            text-decoration: none;
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #8b9bb4;
            font-size: 14px;
            font-weight: 600;
        }

        .swal2-html-container {
            font-family: 'Montserrat', sans-serif !important;
        }

        .swal2-title {
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 800 !important;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-betcup">
            <span class="logo-icone">⚽</span>
            <div>
                <div class="logo-texto">BET<span class="logo-destaque">CUP</span></div>
                <span class="logo-subtitulo">O Seu Bolão Oficial</span>
            </div>
        </div>

        <div class="area-usuario">
            <button id="btn-abrir-login" class="btn-header">Entrar</button>

            <div id="area-logado" class="wrapper-acoes-usuario" style="display: none;">
                <div class="linha-topo-usuario">
                    <span id="msg-usuario"></span>
                    <button id="btn-sair" class="btn-header btn-sair">Sair</button>
                </div>
                <a href="https://wa.me/5562992572083?text=Olá,%20preciso%20de%20ajuda%20com%20o%20BetCup!"
                    target="_blank" class="btn-suporte">
                    <span>📱</span> Suporte VIP
                </a>
            </div>
        </div>
    </header>

    <div class="banner-compartilhamento">
        <h4>🔥 Aumente o seu Prêmio!</h4>
        <p>O prêmio cresce a cada aposta. Convide seus amigos para o bolão e faça o valor do premio subir!</p>
        <button onclick="compartilharBolao()" class="btn-share-banner">📲 Compartilhar</button>
    </div>

    <div class="container-abas">
        <button id="aba-pendentes" class="aba-principal ativa">⚽ Apostar</button>
        <button id="aba-minhas-apostas" class="aba-principal">🛒 Sacola</button>
        <button id="aba-finalizados" class="aba-principal">🏁 Resultados</button>
    </div>

    <main>
        <div id="container-pendentes" class="conteudo-aba ativo">
        </div>

        <div id="container-minhas-apostas" class="conteudo-aba"></div>
        <div id="container-finalizados" class="conteudo-aba"></div>
    </main>

    <div id="barra-flutuante-apostas">
        <div class="info-barra">
            <span id="contador-apostas">0 aposta(s)</span>
            <span id="valor-barra-apostas">R$ 0,00</span>
        </div>
        <button id="btn-revisar-apostas">Adicionar ao Carrinho 🛒</button>
    </div>

    <div id="modal-login" class="modal">
        <div class="modal-content">
            <span class="fechar" id="fechar-modal">❌</span>
            <div id="tela-login">
                <h3 style="color: #ffffff; text-align: center; margin-bottom: 20px;">Acesso Rápido</h3>
                <input type="email" id="login-email" class="input-auth" placeholder="Seu E-mail">
                <div style="position: relative;">
                    <input type="password" id="login-senha" class="input-auth" placeholder="Sua Senha">
                    <span id="toggle-login-senha"
                        style="position: absolute; right: 15px; top: 12px; cursor: pointer;">👁️</span>
                </div>
                <button id="btn-entrar" class="btn-auth">Entrar na Conta</button>
                <a href="#" id="link-abrir-cadastro" class="link-auth">Ainda não tem conta? <strong>Cadastre-se
                        grátis!</strong></a>
            </div>
            <div id="tela-cadastro" style="display: none;">
                <h3 style="color: #ffffff; text-align: center; margin-bottom: 20px;">Criar Conta</h3>
                <input type="text" id="cad-nome" class="input-auth" placeholder="Nome Completo">
                <input type="tel" id="cad-telefone" class="input-auth" placeholder="WhatsApp">
                <input type="email" id="cad-email" class="input-auth" placeholder="E-mail">
                <div style="position: relative;">
                    <input type="password" id="cad-senha" class="input-auth" placeholder="Crie uma Senha">
                    <span id="toggle-cad-senha"
                        style="position: absolute; right: 15px; top: 12px; cursor: pointer;">👁️</span>
                </div>
                <div style="position: relative;">
                    <input type="password" id="cad-confirma-senha" class="input-auth" placeholder="Confirme a Senha">
                    <span id="toggle-cad-confirma-senha"
                        style="position: absolute; right: 15px; top: 12px; cursor: pointer;">👁️</span>
                </div>
                <button id="btn-cadastrar" class="btn-auth">Criar Conta</button>
                <a href="#" id="link-voltar-login" class="link-auth">Já possui conta? <strong>Faça Login.</strong></a>
            </div>
            <p id="msg-erro-auth"
                style="color: #ff3366; font-size: 12px; text-align: center; margin-top: 15px; min-height: 15px;"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
</body>

</html>
